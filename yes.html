<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 3rd Anniversary ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Nunito', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: linear-gradient(135deg, #ffdde1, #ee9ca7);
        overflow: hidden;
    }

    /* Floating hearts background */
    .hearts::before,
    .hearts::after {
        content: "❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤";
        position: absolute;
        width: 100%;
        font-size: 2rem;
        color: rgba(255,255,255,0.2);
        animation: float 14s linear infinite;
        white-space: nowrap;
    }

    .hearts::after {
        top: 50%;
        animation-delay: 7s;
    }

    @keyframes float {
        from { transform: translateY(100vh); }
        to { transform: translateY(-120vh); }
    }

    /* Card */
    .card {
        position: relative;
        z-index: 2;
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        max-width: 520px;
        color: white;
        animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    h1 {
        font-size: 2.8rem;
        font-weight: 900;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 1.1rem;
        margin-bottom: 20px;
        opacity: 0.95;
    }

    .gif img {
        width: 220px;
        border-radius: 20px;
        margin: 15px 0;
    }

    .message {
        font-size: 1.05rem;
        line-height: 1.6;
        margin-top: 10px;
    }

    /* Music button */
    #musicBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        border: none;
        padding: 12px 14px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
</style>
</head>

<body>

<div class="hearts"></div>

<div class="card">
    <h1>Happy 3rd Anniversary ❤️</h1>
    <p class="subtitle">
        Three beautiful years, countless memories, one love.
    </p>

    <div class="gif">
        <img src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="cute gif">
    </div>

    <p class="message">
        Thank you for loving me through every high and low.  
        You are my safe place, my happiness, and my forever person.  
        Here’s to more years of laughter, love, and growing together.💕
        I love you so much, my love! 
    </p>
</div>

<audio id="music" loop autoplay>
    <source src="music/Adie - Tahanan _ Piano Cover with Strings (with Lyrics) [Q6d-YTK_a5I].mp3>
</audio>

<button id="musicBtn" onclick="toggleMusic()">🔊</button>

<script>
    // Confetti on load
    window.onload = () => {
        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });
    };

    // Music toggle
    const music = document.getElementById("music");
    const btn = document.getElementById("musicBtn");

    function toggleMusic() {
        if (music.paused) {
            music.play();
            btn.innerHTML = "🔊";
        } else {
            music.pause();
            btn.innerHTML = "🔈";
        }
    }
</script>

</body>
</html>
