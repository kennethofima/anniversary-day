<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Happy 3rd Anniversary ❤️
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hearts-bg"></div>

    <div class="container">

        <h1>
            Happy 3rd Anniversary ❤️
        </h1>

        <div class="gif-container">

            <img
                id="cat-gif"
                src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif"
                alt="cute anniversary character"
            >

        </div>

        <p class="anniversary-text">
            Will you continue making more beautiful memories with me forever? 💕
        </p>

        <div class="buttons">

            <button
                id="yes-btn"
                onclick="handleYesClick()"
            >
                Yes ❤️
            </button>

            <button
                id="no-btn"
                onclick="handleNoClick()"
            >
                No
            </button>

        </div>

        <div id="tease-toast"></div>

    </div>

    <audio
        id="bg-music"
        loop
        autoplay
        muted
    >
        <source
            src="music/Adie - Tahanan _ Piano Cover with Strings (with Lyrics) [Q6d-YTK_a5I].mp3"
            type="audio/mpeg"
        >
    </audio>

    <button
        id="music-toggle"
        onclick="toggleMusic()"
        title="Toggle music"
    >
        🔊
    </button>

    <script src="script.js"></script>

</body>
</html>
